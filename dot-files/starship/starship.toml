"$schema" = 'https://starship.rs/config-schema.json'

# Required to avoid the empty line when using a new terminal session 
add_newline=false
palette = 'catppuccin_frappe'

# Left side prompt: OS -> Directory -> Git
format = """[¯éÂ](mauve)\
$os\
[¯é░](bg:lavender fg:mauve)\
$directory\
[¯é░](bg:blue fg:lavender)\
$git_branch\
$git_status\
[¯é░ ](fg:blue)\
$line_break\
$character"""

# Right side prompt: Cleanly bound inside an unbreakable background container
