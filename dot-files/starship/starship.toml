[¯éÂ](fg:surface0)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$docker_context\
$cmd_duration\
$time\
[¯é┤](fg:surface0)"""

[os]
