[cmd_duration]
show_milliseconds = true
disabled = false
min_time_to_notify = 45000
show_notifications = true
style = "bg:surface0 fg:yellow"
format = '[¯½┤ $duration ]($style)[| ](fg:bright-black bg:surface0)'

[time]
disabled = false
time_format = "%R"
