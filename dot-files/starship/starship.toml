"$schema" = 'https://starship.rs/config-schema.json'

# Left side prompt - Added $os at the very beginning
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$character"""

# Right side prompt
right_format = """
$nodejs\
$python\
$java\
$time"""

# --- OS Icon Configuration ---
[os]
disabled = false
style = "bold blue"
format = "[$symbol]($style) "

# Basic fallback symbols (Starship will auto-detect your OS and use the right icon)
[os.symbols]
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΎΖ╗"
Arch = "≤░μΘ"
CentOS = "ΎΝΕ"
Debian = "ΎΝΗ"
Fedora = "≤░μδ"
FreeBSD = "ΎΝΝ"
Garuda = "≤░μΧ"
Gentoo = "ΎΝΞ"
HardenedBSD = "≤░ηΝ"
Illumos = "≤░Ι╕"
Linux = "ΎΖ╝"
Mabox = "Όυο"
Macos = "ΎΖ╣"
Manjaro = "ΎΝΤ"
MidnightBSD = "ΎΗΗ"
Mint = "ΎΝΟ"
NetBSD = "ΎΑν"
NixOS = "ΎΝΥ"
OpenBSD = "≤░Ι║"
OpenCloudOS = "έαΒΎ╕Π"
Pop = "ΎΝς"
Raspbian = "ΎΝΧ"
Redhat = "ΎΝΨ"
RedHatEnterprise = "ΎΝΨ"
RockyLinux = "ΎΝΨ"
Redox = "≤░γΩ"
Solus = "ΎΝφ"
SUSE = "ΎΝΦ"
Ubuntu = "ΎΝδ"
Unknown = "ΎΖ╝"
Void = "ΎΝχ"
Windows = "≤░Ψ│"

[directory]
style = "blue"

[character]
success_symbol = "[έζψ](purple)"
error_symbol = "[έζψ](red)"
vimcmd_symbol = "[έζχ](green)"

# --- Updated Git Configurations with Nerd Font Icons ---

[git_branch]
format = "[$symbol$branch]($style) "
style = "bright-black"
symbol = "ΎΡα " # Nerd Font Git Branch Icon

[git_status]
format = "[[($all_status$ahead_behind)]($style) ]($style)"
style = "cyan"
conflicted = "≤░│ο "  # ≤░│ο
untracked = "? "   # ΎΕρ
modified = "Ότη "    # Ότη
staged = "ΎΣΩ "      # ΎΣΩ
renamed = "ΎΣγ "     # ΎΣγ
deleted = "ΎΣα "     # ΎΣα
stashed = "Όυσ "     # Όυσ

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

# --- Right Side Modules Configuration ---

[time]
disabled = false
format = "[ΎΑΩ $time]($style) "
style = "bright-black"
time_format = "%R"

[python]
format = "[$symbol$virtualenv]($style) "
style = "bold bright-black"
symbol = "ΌαΗ "             # Nerd Font Python Icon

[nodejs]
format = "[$symbol$version]($style) "
style = "bold green"
symbol = "Όεα "             # Nerd Font Node.js Icon

[java]
format = "[$symbol$version]($style) "
style = "bold red"
symbol = "Όε╕ "             # Nerd Font Java Icon
