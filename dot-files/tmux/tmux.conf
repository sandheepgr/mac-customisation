source-file ~/.config/tmux/tmux.reset.conf
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

set -g prefix ^A
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "${TERM}"
# Enable vim mode navigation in tmux content ( Prefix +  [ )
setw -g mode-keys vi
# Enable mouse scrolling for the content in the pane ( by default atuin was coming)
set -g mouse on
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set-option -g status-style bg=default

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '/Users/omerxx/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @catppuccin_flavor "mocha"

# 1. Use the powerline/airline separators natively
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator "  "
set -g @catppuccin_window_number_position "left"

# 2. Tell Catppuccin to use the directory name as the text
set -g @catppuccin_window_default_fill "none"
set -g @catppuccin_window_default_text "#(echo '#{b:pane_current_path}')"

# 3. Highlight the active window with a solid surface background
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_window_current_text "#(echo '#{b:pane_current_path}')#{?window_zoomed_flag, (),}"

# 4. Adjust the colors to match your dark pastel style
set -g @catppuccin_window_default_background "#313244" # surface0
set -g @catppuccin_window_default_color "#6c7086"      # overlay0

set -g @catppuccin_window_current_background "#45475a" # surface1
set -g @catppuccin_window_current_color "#89b4fa"      # blue

# Disable catppuccin status modules (built manually after TPM)
set -g @catppuccin_status_modules_left ""
set -g @catppuccin_status_modules_right ""

set -g status-position bottom
set -g status-interval 2
set -g status-left-length 120
set -g status-right-length 120

run '~/.tmux/plugins/tpm/tpm'

# ---- All overrides AFTER TPM ------------------------------------------------
# Catppuccin Mocha: base=#1e1e2e surface0=#313244 surface1=#45475a
#                  text=#cdd6f4  green=#a6e3a1

set -g status-style "bg=#1e1e2e"
set -g status-justify left

# Completely remove the native separator to let the individual tabs handle transitions
set -g window-status-separator ""

# LEFT (straight end ): Solid Mauve session block -> Surface0 Git text container -> cleanly transitions out
#set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold] 󰪡 #S #[fg=#cba6f7,bg=#313244]#[fg=#a6e3a1,bg=#313244] #(gitmux -cfg $HOME/.gitmux.conf '#{pane_current_path}')#[fg=#313244,bg=#1e1e2e]"
# LEFT with rounded end 
set -g status-left "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold]󰪡 #S #[fg=#cba6f7,bg=#313244]#[fg=#a6e3a1,bg=#313244] #(gitmux -cfg $HOME/.gitmux.conf '#{pane_current_path}')#[fg=#313244,bg=#1e1e2e]"

# INACTIVE WINDOWS: Slices beautifully out of the base background into surface1
set -g window-status-format "#[fg=#1e1e2e,bg=#313244]#[fg=#6c7086,bg=#313244] #I  #{b:pane_current_path}#{?window_zoomed_flag,#[fg=#fab387] (),} #[fg=#313244,bg=#1e1e2e]"

# ACTIVE WINDOW: Blue accent highlight lifted onto a clear surface container
set -g window-status-current-format "#[fg=#1e1e2e,bg=#45475a]#[fg=#89b4fa,bg=#45475a,bold] #I  #{b:pane_current_path}#{?window_zoomed_flag,#[fg=#fab387] (),} #[fg=#45475a,bg=#1e1e2e]"

# RIGHT: (straight end) [CPU]  [RAM]  [Host] — Swapped anchor block to Lavender and accents to Teal
#set -g status-right "#[fg=#313244,bg=#1e1e2e]#[fg=#94e2d5,bg=#313244]   #(~/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#45475a,bg=#313244]#[fg=#cdd6f4,bg=#45475a]   #(~/.tmux/scripts/ram.sh) #[fg=#b4befe,bg=#45475a]#[fg=#1e1e2e,bg=#b4befe,bold] 󰍹 #H "
# RIGHT with rounded end 
set -g status-right "#[fg=#313244,bg=#1e1e2e]#[fg=#94e2d5,bg=#313244]   #(~/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#45475a,bg=#313244]#[fg=#cdd6f4,bg=#45475a]   #(~/.tmux/scripts/ram.sh) #[fg=#b4befe,bg=#45475a]#[fg=#1e1e2e,bg=#b4befe,bold] 󰍹 #H#[fg=#b4befe,bg=default]"
